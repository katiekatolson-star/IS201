<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tetris Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    canvas {
      background: #000;
      border: 2px solid #444;
      margin-top: 10px;
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-size: 32px;
      z-index: 10;
    }

    .overlay button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Tetris</h1>
  <canvas id="tetris" width="240" height="400"></canvas>

  <div class="info">
    Controls: ← → move | ↓ drop | Q/W rotate
  </div>

  <div id="gameOverScreen" class="overlay">
    <div>GAME OVER</div>
    <button onclick="restartGame()">Restart</button>
  </div>

<script>
const canvas = document.getElementById("tetris");
const context = canvas.getContext("2d");
context.scale(20, 20);

let gameOver = false;

function createMatrix(w, h) {
  const matrix = [];
  while (h--) matrix.push(new Array(w).fill(0));
  return matrix;
}

function createPiece(type) {
  if (type === "T") return [[0,0,0],[1,1,1],[0,1,0]];
  if (type === "O") return [[2,2],[2,2]];
  if (type === "L") return [[0,3,0],[0,3,0],[0,3,3]];
  if (type === "J") return [[0,4,0],[0,4,0],[4,4,0]];
  if (type === "I") return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
  if (type === "S") return [[0,6,6],[6,6,0],[0,0,0]];
  if (type === "Z") return [[7,7,0],[0,7,7],[0,0,0]];
}

function collide(arena, player) {
  const m = player.matrix;
  const o = player.pos;
  for (let y = 0; y < m.length; y++) {
    for (let x = 0; x < m[y].length; x++) {
      if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
        return true;
      }
    }
  }
  return false;
}

function merge(arena, player) {
  player.matrix.forEach((row, y) => {
    row.forEach((v, x) => {
      if (v) arena[y + player.pos.y][x + player.pos.x] = v;
    });
  });
}

function arenaSweep() {
  outer: for (let y = arena.length - 1; y >= 0; y--) {
    for (let x = 0; x < arena[y].length; x++) {
      if (arena[y][x] === 0) continue outer;
    }
    arena.splice(y, 1);
    arena.unshift(new Array(12).fill(0));
    y++;
  }
}

function rotate(matrix, dir) {
  for (let y = 0; y < matrix.length; y++) {
    for (let x = 0; x < y; x++) {
      [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
    }
  }
  if (dir > 0) matrix.forEach(r => r.reverse());
  else matrix.reverse();
}

function playerReset() {
  const pieces = "TJLOSZI";
  player.matrix = createPiece(pieces[(Math.random() * pieces.length) | 0]);
  player.pos.y = 0;
  player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

  if (collide(arena, player)) endGame();
}

function playerDrop() {
  if (gameOver) return;

  player.pos.y++;

  if (collide(arena, player)) {
    player.pos.y--;
    merge(arena, player);
    arenaSweep();
    playerReset();
  }

  // FIX: reset drop timer so speed stays normal
  dropCounter = 0;
}

function playerMove(dir) {
  if (gameOver) return;
  player.pos.x += dir;
  if (collide(arena, player)) player.pos.x -= dir;
}

function playerRotate(dir) {
  if (gameOver) return;
  const pos = player.pos.x;
  let offset = 1;
  rotate(player.matrix, dir);
  while (collide(arena, player)) {
    player.pos.x += offset;
    offset = -(offset + (offset > 0 ? 1 : -1));
    if (offset > player.matrix[0].length) {
      rotate(player.matrix, -dir);
      player.pos.x = pos;
      return;
    }
  }
}

function endGame() {
  gameOver = true;
  document.getElementById("gameOverScreen").style.display = "flex";
}

function restartGame() {
  arena.forEach(r => r.fill(0));
  gameOver = false;
  document.getElementById("gameOverScreen").style.display = "none";
  playerReset();
  update();
}

let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;

function update(time = 0) {
  if (gameOver) return;

  const delta = time - lastTime;
  lastTime = time;

  dropCounter += delta;
  if (dropCounter > dropInterval) playerDrop();

  draw();
  requestAnimationFrame(update);
}

function drawMatrix(matrix, offset) {
  matrix.forEach((row, y) => {
    row.forEach((v, x) => {
      if (v) {
        context.fillStyle = "hsl(" + v * 50 + ",70%,50%)";
        context.fillRect(x + offset.x, y + offset.y, 1, 1);
      }
    });
  });
}

function draw() {
  context.fillStyle = "#000";
  context.fillRect(0, 0, canvas.width, canvas.height);
  drawMatrix(arena, { x: 0, y: 0 });
  drawMatrix(player.matrix, player.pos);
}

const arena = createMatrix(12, 20);
const player = { pos: { x: 0, y: 0 }, matrix: null };

window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") playerMove(-1);
  else if (e.key === "ArrowRight") playerMove(1);
  else if (e.key === "ArrowDown") playerDrop();
  else if (e.key.toLowerCase() === "q") playerRotate(-1);
  else if (e.key.toLowerCase() === "w") playerRotate(1);
});

playerReset();
update();
</script>
</body>
</html>
